name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check (format + lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - run: yarn install --immutable

      - run: yarn lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - run: yarn install --immutable

      - run: yarn test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - run: yarn install --immutable

      - run: yarn build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: corepack enable

      - uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium firefox webkit

      - name: Build Docker image
        run: docker build . -t recommendarr:e2e

      - name: Run E2E tests
        run: yarn test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [check, test, build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check if merged PR has [publish] in title
        id: check-publish
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          PR_TITLE=$(gh pr list --repo "$REPO" --state merged --search "$COMMIT_SHA" --json title --jq '.[0].title // ""')
          echo "pr_title=$PR_TITLE"
          if echo "$PR_TITLE" | grep -qi '\[publish\]'; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

          # Detect bump type from PR title
          if echo "$PR_TITLE" | grep -qi '\[major\]'; then
            echo "bump_type=major" >> "$GITHUB_OUTPUT"
          elif echo "$PR_TITLE" | grep -qi '\[minor\]'; then
            echo "bump_type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$PR_TITLE" | grep -qi '\[patch\]'; then
            echo "bump_type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "bump_type=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-publish.outputs.should_publish == 'true'

      - name: Log in to GitHub Container Registry
        if: steps.check-publish.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version for Docker tags
        id: version
        if: steps.check-publish.outputs.should_publish == 'true'
        run: |
          TAG=$(awk '/^## v[0-9]+\.[0-9]+\.[0-9]+/{print $2; exit}' CHANGELOG.md)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.check-publish.outputs.should_publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Extract changelog and create release
        if: steps.check-publish.outputs.should_publish == 'true' && steps.check-publish.outputs.bump_type != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract the version tag from the first changelog heading (e.g., "## v1.2.3 (2026-03-22)")
          TAG=$(awk '/^## v[0-9]+\.[0-9]+\.[0-9]+/{print $2; exit}' CHANGELOG.md)

          if [ -z "$TAG" ]; then
            echo "Error: Could not extract version from CHANGELOG.md"
            exit 1
          fi

          # Extract the release notes (everything between first and second ## headers)
          RELEASE_NOTES=$(awk '/^## /{if(found) exit; found=1; next} found{print}' CHANGELOG.md)

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$RELEASE_NOTES" \
            --target main
