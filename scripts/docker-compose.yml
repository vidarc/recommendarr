services:
  mock-services:
    build:
      context: ../e2e/mock-services
      dockerfile: Dockerfile.mock
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:7878/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 3s
      start_period: 5s
      retries: 3

  recommendarr:
    image: recommendarr:e2e
    depends_on:
      mock-services:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENCRYPTION_KEY: "97edee5ae27e974c3705ef05bd4a11f6cd1e233ee088de4892bf4417fca402f0"
      NODE_ENV: "production"
      TMDB_API_KEY: "mock-tmdb-key"
      TMDB_API_BASE_URL: "http://mock-services:5001/3"
      TVDB_API_KEY: "mock-tvdb-key"
      TVDB_API_BASE_URL: "http://mock-services:5002/v4"
    tmpfs:
      - /app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/ping').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 3
